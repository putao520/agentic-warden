name: Release to NPM & GitHub

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: 编译多平台CLI二进制
  build-binaries:
    name: Build CLI Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: aiw-linux-x64
            binary_name: aiw
          - target: x86_64-pc-windows-gnu
            artifact_name: aiw-windows-x64
            binary_name: aiw.exe
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust targets
      run: |
        rustup target add x86_64-unknown-linux-musl
        rustup target add x86_64-pc-windows-gnu
        # Install cross-compilation tools
        sudo apt-get update
        sudo apt-get install -y musl-tools mingw-w64

    - name: Install zig for cross-compilation
      run: |
        # Install zig (provides better cross-compilation support)
        wget -q https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
        tar -xf zig-linux-x86_64-0.13.0.tar.xz
        sudo mv zig-linux-x86_64-0.13.0 /opt/zig
        export PATH="/opt/zig:$PATH"
        echo "/opt/zig" >> $GITHUB_PATH

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}

    - name: Build x86_64-unknown-linux-musl
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        export PATH="/opt/zig:$PATH"
        cargo install cargo-zigbuild
        cargo zigbuild --release --target x86_64-unknown-linux-musl

    - name: Build x86_64-pc-windows-gnu
      if: matrix.target == 'x86_64-pc-windows-gnu'
      run: |
        export PATH="/opt/zig:$PATH"
        cargo install cargo-zigbuild
        cargo zigbuild --release --target x86_64-pc-windows-gnu

    - name: Prepare artifact
      run: |
        if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
          OUTPUT_DIR="target/x86_64-pc-windows-gnu/release"
          OUTPUT_FILE="aiw.exe"
        else
          OUTPUT_DIR="target/x86_64-unknown-linux-musl/release"
          OUTPUT_FILE="aiw"
        fi
        mkdir -p artifacts
        cp "$OUTPUT_DIR/$OUTPUT_FILE" "artifacts/${{ matrix.artifact_name }}"
        file "artifacts/${{ matrix.artifact_name }}"
        ls -lah "artifacts/"

    - name: Upload binary artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: artifacts/${{ matrix.artifact_name }}
        retention-days: 1

  # Job 2: 准备NPM包并发布
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      id-token: write  # Required for npm OIDC trusted publishing

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create bin directory
      run: mkdir -p bin

    - name: Download Linux binary
      uses: actions/download-artifact@v4
      with:
        name: aiw-linux-x64
        path: bin/

    - name: Download Windows binary
      uses: actions/download-artifact@v4
      with:
        name: aiw-windows-x64
        path: bin/

    - name: Prepare binaries for NPM
      run: |
        # 重命名文件以符合 npm 包约定
        mv bin/aiw bin/aiw-linux-x64
        mv bin/aiw.exe bin/aiw-windows-x64.exe

        # 设置可执行权限
        chmod +x bin/*

        # 列出文件
        ls -lah bin/

    - name: Update package.json with correct version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
        echo "✅ 发布版本: $VERSION"
        cat package.json | grep version

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Ensure npm version supports OIDC
      run: |
        npm install -g npm@latest
        npm --version

    - name: Publish to NPM (OIDC Trusted Publishing)
      run: npm publish --access public

    - name: 📢 Publish success notification
      if: success()
      run: |
        echo "✅ NPM包发布成功！"
        echo "Package: aiw"
        echo "Version: ${GITHUB_REF#refs/tags/v}"
        echo "Registry: https://npmjs.com/package/aiw"

  # Job 3: 发布二进制到GitHub Release
  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Linux binary
      uses: actions/download-artifact@v4
      with:
        name: aiw-linux-x64
        path: release-files/

    - name: Download Windows binary
      uses: actions/download-artifact@v4
      with:
        name: aiw-windows-x64
        path: release-files/

    - name: Generate checksums
      run: |
        cd release-files
        sha256sum * > SHA256SUMS
        cat SHA256SUMS
        ls -lah

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release-files/aiw-linux-x64
          release-files/aiw-windows-x64.exe
          release-files/SHA256SUMS
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
