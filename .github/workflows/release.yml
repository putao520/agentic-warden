name: Release to NPM & GitHub

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: 构建 Linux x64 gnu 二进制 (ort-sys 需要 glibc)
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust target
      run: rustup target add x86_64-unknown-linux-gnu

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-gnu

    - name: Build for Linux gnu
      run: cargo build --release --target x86_64-unknown-linux-gnu

    - name: Prepare artifact
      run: |
        mkdir -p artifacts
        cp target/x86_64-unknown-linux-gnu/release/aiw artifacts/aiw-linux-x64
        file artifacts/aiw-linux-x64
        ls -lah artifacts/

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: aiw-linux-x64
        path: artifacts/aiw-linux-x64
        retention-days: 1

  # Job 2: 准备NPM包并发布 (仅 Linux)
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build-linux
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      id-token: write  # Required for npm OIDC trusted publishing

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create bin directory
      run: mkdir -p bin

    - name: Download Linux binary
      uses: actions/download-artifact@v4
      with:
        name: aiw-linux-x64
        path: bin/

    - name: Prepare binaries for NPM
      run: |
        # 设置可执行权限
        chmod +x bin/*

        # 列出文件
        ls -lah bin/

    - name: Update package.json with correct version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
        echo "✅ 发布版本: $VERSION"
        cat package.json | grep version

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Ensure npm version supports OIDC
      run: |
        npm install -g npm@latest
        npm --version

    - name: Publish to NPM (OIDC Trusted Publishing)
      run: npm publish --access public

    - name: 📢 Publish success notification
      if: success()
      run: |
        echo "✅ NPM包发布成功！"
        echo "Package: aiw"
        echo "Version: ${GITHUB_REF#refs/tags/v}"
        echo "Registry: https://npmjs.com/package/aiw"

  # Job 3: 发布二进制到GitHub Release (仅 Linux)
  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-linux
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Linux binary
      uses: actions/download-artifact@v4
      with:
        name: aiw-linux-x64
        path: release-files/

    - name: Generate checksums
      run: |
        cd release-files
        sha256sum * > SHA256SUMS
        cat SHA256SUMS
        ls -lah

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release-files/aiw-linux-x64
          release-files/SHA256SUMS
        generate_release_notes: true
        body: |
          ## 🚀 Release Notes

          This release includes:
          - Linux x64 binary (glibc)

          ## ⚠️ Known Issues
          - Windows build temporarily disabled due to ort-sys linking issues with MSVC
          - Working on a fix for future releases
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
