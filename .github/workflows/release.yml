name: Release to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  # 发布到 NPM (使用 OIDC Trusted Publishing)
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    # CRITICAL: OIDC 必需的权限
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'  # 必需保留（即使使用OIDC）

    - name: Upgrade npm
      run: npm install -g npm@latest  # 升级到 npm >= 11.5.1 支持 OIDC

    - name: Publish to NPM with Provenance
      working-directory: npm-package
      run: npm publish --provenance --access public
      # 自动使用 OIDC，无需 NODE_AUTH_TOKEN
