# CI工作流 - 遵循SPEC CI容器化测试铁律
# 除单元测试外，所有测试必须在CI容器中执行

name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1: 单元测试（主机执行）
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: cargo test --lib --tests unit -- --nocapture

      - name: Run doctests
        run: cargo test --doc

      - name: Check code formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  # Job 2: 集成测试（CI容器执行）
  integration-tests:
    name: Integration Tests (Containerized)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start CI environment
        run: |
          docker-compose -f docker-compose.ci.yml up -d ollama
          sleep 30  # 等待Ollama服务启动

      - name: Build CI image
        run: docker-compose -f docker-compose.ci.yml build aiw

      - name: Run integration tests
        run: |
          docker-compose -f docker-compose.ci.yml run --rm integration-tester

      - name: Upload integration test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: test-results/

      - name: Clean up
        if: always()
        run: docker-compose -f docker-compose.ci.yml down -v

  # Job 3: E2E测试（CI容器执行）
  e2e-tests:
    name: E2E Tests (Containerized)
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start CI environment
        run: |
          docker-compose -f docker-compose.ci.yml up -d
          sleep 60  # 等待所有服务就绪

      - name: Verify services are healthy
        run: |
          docker-compose -f docker-compose.ci.yml ps
          curl -f http://localhost:11434/api/tags || exit 1

      - name: Run E2E tests
        run: |
          docker-compose -f docker-compose.ci.yml run --rm e2e-tester

      - name: Upload E2E test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-test-results
          path: test-results/

      - name: Upload logs
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: e2e-test-logs
          path: |
            logs/
            test-results/

      - name: Clean up
        if: always()
        run: docker-compose -f docker-compose.ci.yml down -v

  # Job 4: 测试覆盖率报告
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --out Xml --out Html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./cobertura.xml
          fail_ci_if_error: true

  # Job 5: 构建验证
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build for ${{ matrix.target }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: aiw-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/aiw
          retention-days: 7

  # Job 6: 安全扫描
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run cargo-audit
        run: |
          cargo install cargo-audit
          cargo audit

      - name: Run cargo-deny
        run: |
          cargo install cargo-deny
          cargo deny check

  # Job 7: 发布准备（仅在tag推送时运行）
  release-ready:
    name: Release Ready Check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [unit-tests, integration-tests, e2e-tests, build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          SPEC_VERSION=$(cat SPEC/VERSION)
          CARGO_VERSION=$(grep '^version' Cargo.toml | cut -d'"' -f2)
          echo "SPEC version: $SPEC_VERSION"
          echo "Cargo version: $CARGO_VERSION"
          if [ "$SPEC_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Version mismatch!"
            exit 1
          fi

      - name: Check CHANGELOG
        run: |
          VERSION=$(cat SPEC/VERSION)
          if ! grep -q "## v$VERSION" SPEC/05-CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md doesn't contain version v$VERSION"
            exit 1
          fi
